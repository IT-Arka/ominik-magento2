<div id="minicartFreeShippingProgress" class="component-wrapper" data-bind="if: getTotalCartItems() > 0">
    <img data-bind="attr: { src: require.toUrl('Omnik_Core/images/lover.svg') }"/>
    <h4 data-bind="text : getText()"></h4>
    <div class="minprogress" id="progress">
        <div class="minprogress-active" id="child-progress" data-bind="style: { width: getpercentage() + '%' } "></div>
    </div>
</div>
